<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMIS Tuyển Dụng</title>
    <link rel="stylesheet" href="./assests/css/common.css">
    <link rel="stylesheet" href="./assests/css/variable.css">
    <link rel="stylesheet" href="./assests/css/page/form.css">
    <link rel="stylesheet" href="./assests/css/page/employees.css">
    <link rel="stylesheet" href="https://testcdnamisapp.misacdn.net/fonts/font.inter.css">
    <link rel="icon" type="img/x-icons" href="https://amisplatform.misacdn.net/apps/recruit2/assets/images/ICON.svg">
</head>
<body>
    <div class="navbar">
        <div class="navbar__left">
            <div class="navbar__left__bg"></div>
            <div class="navbar__left__menu">
                <div class="navbar__left__menu__icon navbar__left__menu__content"></div>
                <div class="navbar__left__menu__searchic navbar__left__menu__content"></div>
                <div class="navbar__left__menu__title navbar__left__menu__content">
                    Tuyển dụng 
                </div>
            </div>
            <div class="navbar__left__search">
            <div class="navbar__left__search__icon"></div>
            <div class="navbar__left__search__input">
                <input type="text" class="navbar__left__search__input__text" placeholder="Tìm kiếm">
            </div>
            </div>
        </div>
        <div class="navbar__right">
            <div class="navbar__right__website">
                <div class="navbar__right__website__icon"></div>
                <div class="navbar__right__website__text">
                    Website tuyển dụng
                </div>
            </div>
            <div class="navbar__right__noti__icon navbar__right__icon"></div>
            <div class="navbar__right__store__icon navbar__right__icon"></div>
            <div class="navbar__right__invite__icon navbar__right__icon"></div>
            <div class="navbar__right__message__icon navbar__right__icon"></div>
            <div class="navbar__right__notification__icon navbar__right__icon"></div>
            <div class="navbar__right__help__icon navbar__right__icon"></div>
            <div class="navbar__right__more__icon navbar__right__icon"></div>
            <div class="navbar__right__knowledge__icon navbar__right__icon"></div>
            <div class="navbar__right__profile__icon navbar__right__icon"></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="sidebar__menu">
            <div class="sidebar__menu__new sidebar__menu__list">
                <div class="sidebar__menu__new__icon sidebar__menu__icon"></div>
                <div class="sidebar__menu__new__text sidebar__menu__text">Tin tuyển dụng</div>
            </div>
            <div class="sidebar__menu__candidate sidebar__menu__list">
                <div class="sidebar__menu__candidate__icon sidebar__menu__icon"></div>
                <div class="sidebar__menu__candidate__text sidebar__menu__text">Ứng viên</div>
            </div>
            <div class="sidebar__menu__calendar sidebar__menu__list">
                <div class="sidebar__menu__calendar__icon sidebar__menu__icon"></div>
                <div class="sidebar__menu__calendar__text sidebar__menu__text">Lịch</div>
            </div>
            <div class="sidebar__menu__store sidebar__menu__list">
                <div class="sidebar__menu__store__icon sidebar__menu__icon"></div>
                <div class="sidebar__menu__store__text sidebar__menu__text">Kho tiềm năng</div>
            </div>
            <div class="sidebar__menu__recruitment sidebar__menu__list">
                <div class="sidebar__menu__recruitment__icon sidebar__menu__icon"></div>
                <div class="sidebar__menu__recruitment__text sidebar__menu__text">Chiến dịch tuyển dụng</div>
            </div>
            <div class="sidebar__menu__job sidebar__menu__list">
                <div class="sidebar__menu__job__icon sidebar__menu__icon"></div>
                <div class="sidebar__menu__job__text sidebar__menu__text">Công việc</div>
            </div>
            <div class="sidebar__menu__marketing sidebar__menu__list">
                <div class="sidebar__menu__marketing__icon sidebar__menu__icon"></div>
                <div class="sidebar__menu__marketing__text sidebar__menu__text">aiMarketing</div>
            </div>
            <div class="sidebar__menu__more sidebar__menu__list">
                <div class="sidebar__menu__more__icon sidebar__menu__icon"></div>
                <div class="sidebar__menu__more__text sidebar__menu__text">Khác</div>
            </div>
        </div>
        <div class="sidebar__toggle">
            <div class="sidebar__toggle__icon"></div>
            <div class="sidebar__toggle__text">Thu gọn</div>
        </div>
    </div>
    <div class="content">
        <div class="content__header">
            <div class="content__header__left">
                <div class="content__header__title">Ứng viên</div>
            </div>
            <div class="content__header__right">
            <div class="content__header__delete">
                <button type="submit" class="content__header__delete__button">
                    <div class="content__header__delete__button__icon"></div>
                    <div class="content__header__delete__button__text">Xóa dữ liệu ứng viên không trúng tuyển</div>
                </button>
            </div>
                <div class="content__header__addnew">
                    <button type="submit" class="content__header__addnew__button">
                        <div class="content__header__addnew__button__icon"></div>
                        <div class="content__header__addnew__button__text">Thêm ứng viên</div>
                    </button>
                    <button type="submit" class="content__header__more__button">
                        <div class="content__header__more__button__icon"></div>
                    </button>
                </div>
            </div>
        </div>
        <div class="content__body">
            <div class="content__body__header">
                <div class="content__body__header__left">
                    <button type="submit" class="content__body__header__left__icon"></button>
                    <div class="content__body__header__left__icon2"></div>
                    <div class="content__body__header__left__textinput">
                        <input type="search" class="content__body__header__left__search" placeholder="Tìm kiếm hoặc nhờ AI trợ giúp">
                    </div>
                </div>
                <div class="content__body__header__right">
                    <button type="submit" class="content__body__header__right__button__filter content__body__header__right__button">
                        <div class="content__body__header__right__button__filter__icon"></div>
                    </button>
                    <button type="submit" class="content__body__header__right__button__export content__body__header__right__button">
                        <div class="content__body__header__right__button__export__icon"></div>
                    </button>
                    <button type="submit" class="content__body__header__right__button__activity content__body__header__right__button">
                        <div class="content__body__header__right__button__activity__icon"></div>
                    </button>
                    <button type="submit" class="content__body__header__right__button__setting content__body__header__right__button">
                        <div class="content__body__header__right__button__setting__icon"></div>
                    </button>
                </div>
            </div>
            <div class="content__body__table">
                <table class="content__body__table__container">
        <thead>
            <tr>
                <th class="col-select"><input type="checkbox" id="select_all_employees"></th>
                <th class="col-name">Họ và tên</th>
                <th class="col-phone">Số điện thoại</th>
                <th class="col-dob">Ngày sinh</th>
                <th class="col-email">Email</th>
                <th class="col-gender">Giới tính</th>
                <th class="col-interact"></th>
            </tr>
      </thead>  
      <tbody id="tbody__employees"></tbody>
                </table>
                
            </div>
            <div class="table__footer">
                    <div id="pagination_container"></div>
                </div>
        </div>
    </div>
    <div id="employee_form_modal" class="modal hidden">
        <div class="modal__overlay" id="employee_modal_overlay"></div>
        <div class="modal__content">
            <form id="employeeForm">
                <h3>Thêm nhân viên</h3>
                <div class="candidate__avartar">
                    <input type="file" name="" id="file__upload__avartar">
                    <label for="file__upload__avartar" class="file__upload__avartar__custom">Ảnh</label>
                </div>
                <div class="employeeForm__detail">
                <label>Họ và tên
                    <input id="input_fullName" type="text">
                </label>
                <label>Số điện thoại
                    <input id="input_phone" type="text">
                </label>
                <label>Ngày sinh
                    <input id="input_dob" type="date">
                </label>
                <label>Email
                    <input id="input_email" type="email">
                </label>
                <label>Giới tính
                    <select id="input_gender">
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                    </select>
                </label>
                </div>
                <div class="modal__actions">
                    <button type="submit" class="btn-primary">Lưu</button>
                    <button type="button" id="employeeFormCancel">Hủy</button>
                </div>
            </form>
        </div>
    </div>
    <script src="/js/datas/candidate.js"></script>
    <script src="/js/components/employees.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
